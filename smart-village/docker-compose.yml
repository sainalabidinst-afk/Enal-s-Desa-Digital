services:
  postgres:
    image: postgres:16-alpine
    container_name: smartvillage-postgres
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smartvillage-backend
    env_file:
      - ./apps/backend-api/.env.development
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend-api:/app
    command: sh -c "npm install && npx prisma generate && npx prisma migrate dev --name init --skip-seed && npm run dev"

  frontend:
    image: node:20-alpine
    container_name: smartvillage-frontend
    working_dir: /app
    environment:
      - NODE_ENV=development
    env_file:
      - ./apps/web-admin/.env.local
    volumes:
      - ./apps/web-admin:/app
    ports:
      - '3000:3000'
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data: