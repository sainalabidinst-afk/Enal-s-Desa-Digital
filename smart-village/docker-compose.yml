services:
  postgres:
    image: postgres:16-alpine
    container_name: smartvillage-postgres
    environment:
      POSTGRES_USER: smartvillage
      POSTGRES_PASSWORD: smartvillage123
      POSTGRES_DB: smart_village
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smartvillage -d smart_village']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-bullseye
    container_name: smartvillage-backend
    working_dir: /app
    env_file:
      - ./apps/backend-api/.env.development
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend-api:/app
    command: sh -c "npm install && npx prisma generate && npx prisma migrate dev --name init --skip-seed && npm run dev"

  frontend:
    image: node:20-alpine
    container_name: smartvillage-frontend
    working_dir: /app/apps/web-admin
    environment:
      NODE_ENV: development
    env_file:
      - ./apps/web-admin/.env.local
    volumes:
      - ./apps/web-admin:/app/apps/web-admin
    ports:
      - '3000:3000'
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data: