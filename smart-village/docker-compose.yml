services:
  postgres:
    image: postgres:16-alpine
    container_name: smartvillage-postgres
    environment:
      POSTGRES_USER: smartvillage
      POSTGRES_PASSWORD: smartvillage123
      POSTGRES_DB: smart_village
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smartvillage -d smart_village']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
    container_name: smartvillage-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://smartvillage:smartvillage123@postgres:5432/smart_village
      JWT_SECRET: your-jwt-secret-key-minimum-32-chars
      JWT_REFRESH_SECRET: your-refresh-secret-key-minimum-32-chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend-api/src:/app/src
    command: sh -c "npx prisma migrate dev --name init --skip-seed && npm run dev"
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3001/api/v1/dashboard']
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    container_name: smartvillage-frontend
    working_dir: /app/apps/web-admin
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./apps/web-admin:/app/apps/web-admin
      - /app/apps/web-admin/node_modules
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data: